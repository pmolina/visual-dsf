<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#3b82f6" opacity="0.06"/>
  <circle cx="1100" cy="500" r="150" fill="#60a5fa" opacity="0.05"/>
  <circle cx="80" cy="520" r="120" fill="#3b82f6" opacity="0.04"/>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="80" height="6" rx="3" fill="url(#accent)"/>

  <!-- BCRA label -->
  <text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" letter-spacing="4" fill="#60a5fa" opacity="0.9">BANCO CENTRAL · ARGENTINA</text>

  <!-- Main title -->
  <text x="80" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#f8fafc">Central de</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#f8fafc">Deudores</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Consultá el historial de deudas por CUIL / CUIT</text>

  <!-- Bottom URL pill -->
  <rect x="80" y="510" width="380" height="52" rx="26" fill="#1e3a5f" opacity="0.8"/>
  <text x="270" y="543" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#60a5fa" text-anchor="middle">pmolina.github.io/bcra</text>

  <!-- Decorative bar chart lines -->
  <rect x="850" y="260" width="28" height="120" rx="4" fill="#3b82f6" opacity="0.5"/>
  <rect x="894" y="220" width="28" height="160" rx="4" fill="#3b82f6" opacity="0.65"/>
  <rect x="938" y="290" width="28" height="90" rx="4" fill="#3b82f6" opacity="0.5"/>
  <rect x="982" y="200" width="28" height="180" rx="4" fill="#60a5fa" opacity="0.8"/>
  <rect x="1026" y="240" width="28" height="140" rx="4" fill="#3b82f6" opacity="0.6"/>
  <rect x="1070" y="270" width="28" height="110" rx="4" fill="#3b82f6" opacity="0.45"/>
  <rect x="1114" y="310" width="28" height="70" rx="4" fill="#3b82f6" opacity="0.35"/>

  <!-- Chart baseline -->
  <line x1="840" y1="384" x2="1155" y2="384" stroke="#334155" stroke-width="2"/>
</svg>
